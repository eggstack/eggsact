name: Release Verification

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Full Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Generated docs check
        run: cargo run --locked --bin generate-docs -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Unit tests
        run: cargo test --locked --all-features --lib

      - name: Binary tests
        run: cargo test --locked --all-features --bins

      - name: Integration tests
        run: cargo test --locked --all-features --tests -- --skip parity

      - name: Doc tests
        run: cargo test --locked --doc

      - name: cargo-deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check advisories bans licenses sources

      - name: Package contents
        run: cargo package --locked --list > package-list.txt

      - name: Assert package contents
        run: |
          # Must include core source
          for f in src/lib.rs src/main.rs Cargo.toml LICENSE README.md; do
            grep -q "^${f}$" package-list.txt || { echo "MISSING: $f"; exit 1; }
          done
          # Must not include excluded paths
          for pat in '^\.(github|opencode|agents)/' '^plans/' '^scripts/' '^fuzz/' '^deny\.toml$' '^AGENTS\.md$'; do
            if grep -qE "$pat" package-list.txt; then
              echo "EXCLUDED PATH LEAKED: $(grep -E "$pat" package-list.txt)"
              exit 1
            fi
          done
          echo "Package content assertions passed ($(wc -l < package-list.txt) files)"

      - name: Package build
        run: cargo package --locked --verbose

      - name: Publish dry run
        run: cargo publish --dry-run --locked

      - name: Generate provenance
        if: always()
        run: |
          PACKAGE_SHA=$(sha256sum Cargo.lock | cut -d' ' -f1)
          RUST_VERSION=$(rustc --version | cut -d' ' -f2)
          PACKAGE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PACKAGE_FILES=$(wc -l < package-list.txt 2>/dev/null || echo 0)

          cat > release-provenance.json <<EOF
          {
            "commit_sha": "$(git rev-parse HEAD)",
            "package_version": "${PACKAGE_VERSION}",
            "rust_stable": "${RUST_VERSION}",
            "msrv": "1.89.0",
            "target_os": "linux",
            "lockfile_sha256": "${PACKAGE_SHA}",
            "package_files": ${PACKAGE_FILES}
          }
          EOF

          echo "## Release Verification" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: $(git rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${PACKAGE_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- Rust stable: ${RUST_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- MSRV: 1.89.0" >> $GITHUB_STEP_SUMMARY
          echo "- Lockfile: ${PACKAGE_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "- Package files: ${PACKAGE_FILES}" >> $GITHUB_STEP_SUMMARY

      - name: Upload provenance artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-provenance
          path: release-provenance.json
          retention-days: 90
