name: Fuzz Extended

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 03:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: nightly

jobs:
  fuzz-extended:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache cargo-fuzz
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: ${{ runner.os }}-fuzz-ext-${{ hashFiles('fuzz/Cargo.lock', 'Cargo.lock') }}

      - name: Build fuzz targets
        run: cargo fuzz build

      - name: Fuzz calculator_expression
        run: cargo fuzz run calculator_expression -- -max_total_time=300 -timeout=10

      - name: Fuzz calculator_normalization
        run: cargo fuzz run calculator_normalization -- -max_total_time=300 -timeout=10

      - name: Fuzz unified_diff
        run: cargo fuzz run unified_diff -- -max_total_time=300 -timeout=10

      - name: Fuzz shell_tokenization
        run: cargo fuzz run shell_tokenization -- -max_total_time=300 -timeout=10

      - name: Fuzz shell_quoting
        run: cargo fuzz run shell_quoting -- -max_total_time=300 -timeout=10

      - name: Fuzz regex_classification
        run: cargo fuzz run regex_classification -- -max_total_time=300 -timeout=10

      - name: Fuzz regex_execution
        run: cargo fuzz run regex_execution -- -max_total_time=300 -timeout=10

      - name: Fuzz json_pointer
        run: cargo fuzz run json_pointer -- -max_total_time=300 -timeout=10

      - name: Fuzz toml_config
        run: cargo fuzz run toml_config -- -max_total_time=300 -timeout=10

      - name: Fuzz unicode_inspection
        run: cargo fuzz run unicode_inspection -- -max_total_time=300 -timeout=10

      - name: Fuzz markdown_fences
        run: cargo fuzz run markdown_fences -- -max_total_time=300 -timeout=10

      - name: Fuzz glob_matching
        run: cargo fuzz run glob_matching -- -max_total_time=300 -timeout=10

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-extended
          path: fuzz/artifacts/
          retention-days: 90

  fuzz-sanitizers:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache cargo-fuzz
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: ${{ runner.os }}-fuzz-san-${{ hashFiles('fuzz/Cargo.lock', 'Cargo.lock') }}

      - name: Build fuzz targets (ASan)
        run: cargo fuzz build --sanitizer=address

      - name: Fuzz calculator_expression (ASan)
        run: cargo fuzz run calculator_expression --sanitizer=address -- -max_total_time=120 -timeout=10

      - name: Fuzz unified_diff (ASan)
        run: cargo fuzz run unified_diff --sanitizer=address -- -max_total_time=120 -timeout=10

      - name: Fuzz shell_tokenization (ASan)
        run: cargo fuzz run shell_tokenization --sanitizer=address -- -max_total_time=120 -timeout=10

      - name: Fuzz regex_classification (ASan)
        run: cargo fuzz run regex_classification --sanitizer=address -- -max_total_time=120 -timeout=10

      - name: Fuzz json_pointer (ASan)
        run: cargo fuzz run json_pointer --sanitizer=address -- -max_total_time=120 -timeout=10

      - name: Fuzz unicode_inspection (ASan)
        run: cargo fuzz run unicode_inspection --sanitizer=address -- -max_total_time=120 -timeout=10

      - name: Fuzz glob_matching (ASan)
        run: cargo fuzz run glob_matching --sanitizer=address -- -max_total_time=120 -timeout=10

      - name: Upload sanitizer crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-sanitizers
          path: fuzz/artifacts/
          retention-days: 90
