name: Fuzz Extended

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 03:00 UTC
  workflow_dispatch:

concurrency:
  group: fuzz-extended
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: nightly

jobs:
  fuzz-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - calculator_expression
          - calculator_normalization
          - unified_diff
          - shell_tokenization
          - shell_quoting
          - regex_classification
          - regex_execution
          - json_pointer
          - toml_config
          - unicode_inspection
          - markdown_fences
          - glob_matching
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache cargo-fuzz
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: ${{ runner.os }}-fuzz-${{ matrix.target }}-${{ hashFiles('fuzz/Cargo.lock', 'Cargo.lock') }}

      - name: Build fuzz target
        run: cargo fuzz build

      - name: Fuzz ${{ matrix.target }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=240 -timeout=10

      - name: Record fuzz metadata
        if: always()
        run: |
          NIGHTLY_VERSION=$(rustc --version)
          FUZZ_VERSION=$(cargo fuzz --version || echo "unknown")
          CORPUS_COUNT=$(find fuzz/corpus/${{ matrix.target }} -type f 2>/dev/null | wc -l || echo 0)
          echo "## Fuzz: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: $(git rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "- Nightly: ${NIGHTLY_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- cargo-fuzz: ${FUZZ_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- Corpus seeds: ${CORPUS_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- Duration: 240s" >> $GITHUB_STEP_SUMMARY

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 90

  fuzz-sanitizers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - calculator_expression
          - unified_diff
          - shell_tokenization
          - regex_classification
          - json_pointer
          - unicode_inspection
          - glob_matching
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache cargo-fuzz
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: ${{ runner.os }}-fuzz-san-${{ matrix.target }}-${{ hashFiles('fuzz/Cargo.lock', 'Cargo.lock') }}

      - name: Build fuzz target (ASan)
        run: cargo fuzz build --sanitizer=address

      - name: Fuzz ${{ matrix.target }} (ASan)
        run: cargo fuzz run ${{ matrix.target }} --sanitizer=address -- -max_total_time=120 -timeout=10

      - name: Upload sanitizer crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-crashes-san-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 90
